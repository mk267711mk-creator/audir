name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd server && npm install
          cd ../client && npm install
          cd ../electron && npm install

      - name: Download yt-dlp for Windows
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o electron/resources/yt-dlp.exe

      - name: Build client
        run: cd client && npm run build:electron

      - name: Build Windows installer
        run: cd electron && npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd server && npm install
          cd ../client && npm install
          cd ../electron && npm install

      - name: Download yt-dlp for macOS
        run: |
          mkdir -p electron/resources
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o electron/resources/yt-dlp_mac
          chmod +x electron/resources/yt-dlp_mac

      - name: Build client
        run: cd client && npm run build:electron

      - name: Build macOS installer
        run: cd electron && npm run build:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/*.exe
            mac-installer/*.dmg
